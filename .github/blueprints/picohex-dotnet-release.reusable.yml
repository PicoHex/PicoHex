name: PicoHex Dotnet Release Reusable

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: .NET SDK version or channel
        required: false
        default: 10.0.x
        type: string
      pack-command:
        description: Shell script that packs all desired NuGet artifacts into ./artifacts/nupkg
        required: true
        type: string
      create-github-release:
        description: Whether to create a GitHub release after publish
        required: false
        default: true
        type: boolean
      release-name-prefix:
        description: Prefix used for GitHub release naming
        required: false
        default: ''
        type: string
    secrets:
      NUGET_API_KEY:
        required: true

permissions:
  contents: read

concurrency:
  group: picohex-release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  pack:
    name: Pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Prepare package output directory
        shell: bash
        run: |
          rm -rf ./artifacts/nupkg
          mkdir -p ./artifacts/nupkg

      - name: Pack artifacts
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ${{ inputs.pack-command }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            ./artifacts/nupkg/*.nupkg
            ./artifacts/nupkg/*.snupkg

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: pack
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Publish to NuGet.org
        shell: bash
        run: |
          for file in *.nupkg; do
            if [[ "$file" != *.snupkg ]] && [[ "$file" != *.symbols.nupkg ]]; then
              dotnet nuget push "$file" \
                --api-key "${{ secrets.NUGET_API_KEY }}" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done

      - name: Create GitHub release
        if: ${{ inputs.create-github-release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ inputs.release-name-prefix != '' && format('{0} {1}', inputs.release-name-prefix, needs.pack.outputs.version) || needs.pack.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            *.nupkg
            *.snupkg
