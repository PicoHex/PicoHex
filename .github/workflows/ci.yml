name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force-all:
        description: 'Force run all modules (ignore path filter)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pico-di: ${{ steps.filter.outputs.pico-di }}
      pico-cfg: ${{ steps.filter.outputs.pico-cfg }}
      pico-log: ${{ steps.filter.outputs.pico-log }}
      pico-aop: ${{ steps.filter.outputs.pico-aop }}
      pico-mediator: ${{ steps.filter.outputs.pico-mediator }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pico-di:
              - 'PicoDI/**'
              - 'Directory.Build.props'
              - 'Directory.Build.targets'
              - 'Directory.Packages.props'
              - '.github/**'
              - 'global.json'
            pico-mediator:
              - 'PicoMediator/**'
              - 'Directory.Build.props'
              - 'Directory.Build.targets'
              - 'Directory.Packages.props'
              - '.github/**'
              - 'global.json'
            pico-cfg:
              - 'PicoCfg/**'
              - 'Directory.Build.props'
              - 'Directory.Build.targets'
              - 'Directory.Packages.props'
              - '.github/**'
            pico-aop:
              - 'PicoAop/**'
              - 'Directory.Build.props'
              - 'Directory.Build.targets'
              - 'Directory.Packages.props'
              - '.github/**'
              - 'global.json'
            pico-log:
              - 'PicoLog/**'
              - 'Directory.Build.props'
              - 'Directory.Build.targets'
              - 'Directory.Packages.props'
              - '.github/**'
              - 'global.json'
            pico-mediator:
              - 'PicoMediator/**'
              - 'Directory.Build.props'
              - 'Directory.Build.targets'
              - 'Directory.Packages.props'
              - '.github/**'
              - 'global.json'

  # ---------------------------------------------------------------------------
  # PicoDI
  # ---------------------------------------------------------------------------
  validate-picodi:
    name: PicoDI (${{ matrix.logical-target }})
    needs: changes
    if: needs.changes.outputs.pico-di == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux AOT prerequisites
        if: startsWith(matrix.rid, 'linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev
          if [[ "${{ matrix.rid }}" == "linux-arm64" ]]; then
            sudo apt-get install -y gcc binutils
          fi

      - name: Restore dependencies
        run: |
          mkdir -p ./artifacts/nupkg
          dotnet restore PicoDI/tests/PicoDI.Test/PicoDI.Test.csproj -p:UseProjectReferences=true

      - name: Build
        run: dotnet build PicoDI/tests/PicoDI.Test/PicoDI.Test.csproj --configuration Release --no-restore -p:UseProjectReferences=true

      - name: Run tests (coverage)
        if: matrix.rid == 'linux-x64'
        run: dotnet test --project PicoDI/tests/PicoDI.Test/PicoDI.Test.csproj --configuration Release --no-build --verbosity normal --no-progress -p:UseProjectReferences=true --coverage --coverage-output-format cobertura
      - name: Run tests
        if: matrix.rid != 'linux-x64'
        run: dotnet test --project PicoDI/tests/PicoDI.Test/PicoDI.Test.csproj --configuration Release --no-build --verbosity normal --no-progress -p:UseProjectReferences=true
      - name: Upload coverage
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-picodi
          path: PicoDI/tests/PicoDI.Test/TestResults/**/coverage.cobertura.xml

      - name: AOT publish validation
        run: dotnet publish PicoDI/src/PicoDI/ -p:PublishAot=true -r ${{ matrix.rid }} --configuration Release

      - name: Pack CI packages (package-consumer validation)
        shell: bash
        run: |
          rm -rf ./artifacts/ci-nupkg
          rm -rf ./artifacts/ci-packages
          mkdir -p ./artifacts/ci-nupkg
          mkdir -p ./artifacts/ci-packages/abs ./artifacts/ci-packages/pico ./artifacts/ci-packages/gen

          VERSION="0.0.0-ci"
          NUPKG_DIR="$GITHUB_WORKSPACE/artifacts/ci-nupkg"
          NUGET_SOURCE="https://api.nuget.org/v3/index.json"

          dotnet pack PicoDI/src/PicoDI.Gen/PicoDI.Gen.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/gen"

          dotnet pack PicoDI/src/PicoDI.Abs/PicoDI.Abs.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/abs"

          dotnet pack PicoDI/src/PicoDI/PicoDI.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/pico"

  # ---------------------------------------------------------------------------
  # PicoCfg
  # ---------------------------------------------------------------------------
  validate-picocfg:
    name: PicoCfg (${{ matrix.logical-target }})
    needs: changes
    if: needs.changes.outputs.pico-cfg == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux AOT prerequisites
        if: startsWith(matrix.rid, 'linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev
          if [[ "${{ matrix.rid }}" == "linux-arm64" ]]; then
            sudo apt-get install -y gcc binutils
          fi

      - name: Restore dependencies
        run: |
          mkdir -p ./artifacts/nupkg
          dotnet restore PicoCfg/tests/PicoCfg.Tests/PicoCfg.Tests.csproj -p:UseProjectReferences=true

      - name: Build
        run: dotnet build PicoCfg/tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release --no-restore -p:UseProjectReferences=true

      - name: Run PicoCfg tests (coverage)
        if: matrix.rid == 'linux-x64'
        run: dotnet test --project PicoCfg/tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release --no-build --verbosity normal --no-progress -p:UseProjectReferences=true --coverage --coverage-output-format cobertura
      - name: Run PicoCfg tests
        if: matrix.rid != 'linux-x64'
        run: dotnet test --project PicoCfg/tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release --no-build --verbosity normal --no-progress -p:UseProjectReferences=true
      - name: Upload PicoCfg coverage
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-picocfg
          path: PicoCfg/tests/PicoCfg.Tests/TestResults/**/coverage.cobertura.xml
      - name: Run PicoCfg.Gen tests
        if: matrix.rid != 'linux-x64'
        run: dotnet test --project PicoCfg/tests/PicoCfg.Gen.Tests/PicoCfg.Gen.Tests.csproj --configuration Release --verbosity normal --no-progress -p:UseProjectReferences=true
      - name: Run PicoCfg.DI tests
        if: matrix.rid != 'linux-x64'
        run: dotnet test --project PicoCfg/tests/PicoCfg.DI.Tests/PicoCfg.DI.Tests.csproj --configuration Release --verbosity normal --no-progress -p:UseProjectReferences=true

      - name: AOT publish validation
        run: dotnet publish PicoCfg/src/PicoCfg/ -p:PublishAot=true -r ${{ matrix.rid }} --configuration Release

      - name: Pack CI packages (package-consumer validation)
        shell: bash
        run: |
          rm -rf ./artifacts/ci-nupkg
          rm -rf ./artifacts/ci-packages
          mkdir -p ./artifacts/ci-nupkg
          mkdir -p ./artifacts/ci-packages/abs ./artifacts/ci-packages/pico ./artifacts/ci-packages/gen ./artifacts/ci-packages/di

          VERSION="0.0.0-ci"
          NUPKG_DIR="$GITHUB_WORKSPACE/artifacts/ci-nupkg"
          NUGET_SOURCE="https://api.nuget.org/v3/index.json"

          dotnet pack PicoCfg/src/PicoCfg.Gen/PicoCfg.Gen.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/gen"

          dotnet pack PicoCfg/src/PicoCfg.Abs/PicoCfg.Abs.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/abs"

          dotnet pack PicoCfg/src/PicoCfg/PicoCfg.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/pico"

          dotnet pack PicoCfg/src/PicoCfg.DI/PicoCfg.DI.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=true \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/di"

  # ---------------------------------------------------------------------------
  # PicoLog
  # ---------------------------------------------------------------------------
  validate-picolog:
    name: PicoLog (${{ matrix.logical-target }})
    needs: changes
    if: needs.changes.outputs.pico-log == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux AOT prerequisites
        if: startsWith(matrix.rid, 'linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev
          if [[ "${{ matrix.rid }}" == "linux-arm64" ]]; then
            sudo apt-get install -y gcc binutils
          fi

      - name: Restore dependencies
        run: |
          mkdir -p ./artifacts/nupkg
          dotnet restore PicoLog/tests/PicoLog.Tests/PicoLog.Tests.csproj -p:UseProjectReferences=true

      - name: Build
        run: dotnet build PicoLog/tests/PicoLog.Tests/PicoLog.Tests.csproj --configuration Release --no-restore -p:UseProjectReferences=true

      - name: Run PicoLog tests (coverage)
        if: matrix.rid == 'linux-x64'
        run: dotnet test --project PicoLog/tests/PicoLog.Tests/PicoLog.Tests.csproj --configuration Release --no-build --verbosity normal -p:UseProjectReferences=true --coverage --coverage-output-format cobertura -- --hangdump --hangdump-timeout 10m --hangdump-type Full --crashdump --crashdump-type Full --results-directory=${{ github.workspace }}/artifacts/test-results
      - name: Run PicoLog tests
        if: matrix.rid != 'linux-x64' && matrix.rid != 'linux-arm64'
        run: dotnet test --project PicoLog/tests/PicoLog.Tests/PicoLog.Tests.csproj --configuration Release --no-build --verbosity normal -p:UseProjectReferences=true -- --hangdump --hangdump-timeout 10m --hangdump-type Full --crashdump --crashdump-type Full --results-directory=${{ github.workspace }}/artifacts/test-results
      - name: Run PicoLog tests (linux-arm64 — increased parallelism, I/O-bound on slow VM)
        if: matrix.rid == 'linux-arm64'
        run: dotnet test --project PicoLog/tests/PicoLog.Tests/PicoLog.Tests.csproj --configuration Release --no-build --verbosity normal -p:UseProjectReferences=true -- --maximum-parallel-tests 4 --hangdump --hangdump-timeout 10m --hangdump-type Full --crashdump --crashdump-type Full --results-directory=${{ github.workspace }}/artifacts/test-results
      - name: Upload hang/crash dumps
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: picolog-dumps-${{ matrix.logical-target }}
          path: |
            ${{ github.workspace }}/artifacts/test-results/**
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload coverage
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-picolog
          path: PicoLog/tests/PicoLog.Tests/TestResults/**/coverage.cobertura.xml

      - name: AOT publish validation
        run: dotnet publish PicoLog/src/PicoLog/ -p:PublishAot=true -r ${{ matrix.rid }} --configuration Release

      - name: Pack CI packages (package-consumer validation)
        shell: bash
        run: |
          rm -rf ./artifacts/ci-nupkg
          rm -rf ./artifacts/ci-packages
          mkdir -p ./artifacts/ci-nupkg
          mkdir -p ./artifacts/ci-packages/abs ./artifacts/ci-packages/pico ./artifacts/ci-packages/gen ./artifacts/ci-packages/di

          VERSION="0.0.0-ci"
          NUPKG_DIR="$GITHUB_WORKSPACE/artifacts/ci-nupkg"
          NUGET_SOURCE="https://api.nuget.org/v3/index.json"

          dotnet pack PicoLog/src/PicoLog.Gen/PicoLog.Gen.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/gen"

          dotnet pack PicoLog/src/PicoLog.Abs/PicoLog.Abs.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/abs"

          dotnet pack PicoLog/src/PicoLog/PicoLog.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/pico"

          dotnet pack PicoLog/src/PicoLog.DI/PicoLog.DI.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=true \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/di"

  # ---------------------------------------------------------------------------
  # PicoAop
  # ---------------------------------------------------------------------------
  validate-picoaop:
    name: PicoAop (${{ matrix.logical-target }})
    needs: changes
    if: needs.changes.outputs.pico-aop == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Install Linux AOT prerequisites
        if: startsWith(matrix.rid, 'linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev
      - name: Build and test
        run: |
          dotnet restore PicoAop/tests/PicoAop.Tests/PicoAop.Tests.csproj -p:UseProjectReferences=true
          dotnet build PicoAop/tests/PicoAop.Tests/PicoAop.Tests.csproj --configuration Release --no-restore -p:UseProjectReferences=true
          dotnet test --project PicoAop/tests/PicoAop.Tests/PicoAop.Tests.csproj --configuration Release --no-build -p:UseProjectReferences=true

  # ---------------------------------------------------------------------------
  # PicoMediator
  # ---------------------------------------------------------------------------
  validate-picomediator:
    name: PicoMediator (${{ matrix.logical-target }})
    needs: changes
    if: needs.changes.outputs.pico-mediator == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Install Linux AOT prerequisites
        if: startsWith(matrix.rid, 'linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev
      - name: Build and test
        run: |
          dotnet restore PicoMediator/tests/PicoMediator.Tests/PicoMediator.Tests.csproj -p:UseProjectReferences=true
          dotnet build PicoMediator/tests/PicoMediator.Tests/PicoMediator.Tests.csproj --configuration Release --no-restore -p:UseProjectReferences=true
          dotnet test --project PicoMediator/tests/PicoMediator.Tests/PicoMediator.Tests.csproj --configuration Release --no-build -p:UseProjectReferences=true
