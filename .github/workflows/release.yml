name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  # ---------------------------------------------------------------------------
  # Pack
  # ---------------------------------------------------------------------------
  pack:
    name: Pack packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          # Strip leading 'v'
          VERSION="${ref_name#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run all tests
        shell: bash
        run: |
          dotnet test PicoDI/tests/PicoDI.Test/ --configuration Release
          dotnet test PicoCfg/tests/PicoCfg.Tests/ --configuration Release
          dotnet test PicoCfg/tests/PicoCfg.Gen.Tests/ --configuration Release
          dotnet test PicoCfg/tests/PicoCfg.DI.Tests/ --configuration Release
          dotnet test PicoLog/tests/PicoLog.Tests/ --configuration Release

      - name: Pack all packages
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NUPKG_DIR="$GITHUB_WORKSPACE/artifacts/nupkg"
          rm -rf ./artifacts/nupkg
          mkdir -p ./artifacts/nupkg

          # ---- Phase 1: Abstractions (no inter-package dependencies) ----
          dotnet pack PicoDI/src/PicoDI.Abs/PicoDI.Abs.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false

          dotnet pack PicoCfg/src/PicoCfg.Abs/PicoCfg.Abs.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false

          dotnet pack PicoLog/src/PicoLog.Abs/PicoLog.Abs.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false

          # ---- Phase 2: Generators (depend on abstractions) ----
          dotnet pack PicoDI/src/PicoDI.Gen/PicoDI.Gen.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:PicoDiPackageVersion="$VERSION" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoCfg/src/PicoCfg.Gen/PicoCfg.Gen.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoLog/src/PicoLog.Gen/PicoLog.Gen.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          # ---- Phase 3: Consumer libraries (depend on abstractions + generators) ----
          dotnet pack PicoDI/src/PicoDI/PicoDI.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:PicoDiPackageVersion="$VERSION" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoCfg/src/PicoCfg/PicoCfg.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoCfg/src/PicoCfg.DI/PicoCfg.DI.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:PicoDiPackageVersion="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoLog/src/PicoLog/PicoLog.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoLog/src/PicoLog.DI/PicoLog.DI.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:PicoDiPackageVersion="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            ./artifacts/nupkg/*.nupkg
            ./artifacts/nupkg/*.snupkg

  # ---------------------------------------------------------------------------
  # Publish
  # ---------------------------------------------------------------------------
  publish:
    name: Publish ${{ needs.pack.outputs.version || github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: pack
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: nupkg

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish packages to NuGet
        shell: bash
        run: |
          shopt -s nullglob
          for file in *.nupkg; do
            if [[ "$file" != *.snupkg ]] && [[ "$file" != *.symbols.nupkg ]]; then
              dotnet nuget push "$file" \
                --api-key "${{ secrets.NUGET_API_KEY }}" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            *.nupkg
            *.snupkg
