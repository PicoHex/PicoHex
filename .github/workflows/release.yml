name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  # ---------------------------------------------------------------------------
  # Pack
  # ---------------------------------------------------------------------------
  pack:
    name: Pack packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          # Strip leading 'v'
          VERSION="${ref_name#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run all tests
        shell: bash
        run: |
          mkdir -p ./artifacts/nupkg
          dotnet test --project PicoDI/tests/PicoDI.Test/PicoDI.Test.csproj --configuration Release
          dotnet test --project PicoCfg/tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release
          dotnet test --project PicoCfg/tests/PicoCfg.Gen.Tests/PicoCfg.Gen.Tests.csproj --configuration Release
          dotnet test --project PicoCfg/tests/PicoCfg.DI.Tests/PicoCfg.DI.Tests.csproj --configuration Release
          dotnet test --project PicoCfg/tests/PicoCfg.Json.Tests/PicoCfg.Json.Tests.csproj --configuration Release
          dotnet test --project PicoCfg/tests/PicoCfg.Yaml.Tests/PicoCfg.Yaml.Tests.csproj --configuration Release
          dotnet test --project PicoCfg/tests/PicoCfg.Ini.Tests/PicoCfg.Ini.Tests.csproj --configuration Release
          dotnet test --project PicoCfg/tests/PicoCfg.Toml.Tests/PicoCfg.Toml.Tests.csproj --configuration Release
          dotnet test --project PicoLog/tests/PicoLog.Tests/PicoLog.Tests.csproj --configuration Release
          dotnet test --project PicoLog/tests/PicoLog.Json.Tests/PicoLog.Json.Tests.csproj --configuration Release
          dotnet test --project PicoAop/tests/PicoAop.Tests/PicoAop.Tests.csproj --configuration Release
          dotnet test --project PicoMediator/tests/PicoMediator.Tests/PicoMediator.Tests.csproj --configuration Release

      - name: Pack all packages
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NUPKG_DIR="$GITHUB_WORKSPACE/artifacts/nupkg"
          rm -rf ./artifacts/nupkg
          mkdir -p ./artifacts/nupkg

          # ---- Phase 1: Abstractions (bundled generators via UseProjectReferences=true) ----
          # PicoDI.Abs must be packed first because PicoAop.Abs depends on it
          dotnet pack PicoDI/src/PicoDI.Abs/PicoDI.Abs.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=true

          dotnet pack PicoAop/src/PicoAop.Abs/PicoAop.Abs.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=true \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoMediator/src/PicoMediator.Abs/PicoMediator.Abs.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=true

          dotnet pack PicoCfg/src/PicoCfg.Abs/PicoCfg.Abs.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=true

          dotnet pack PicoLog/src/PicoLog.Abs/PicoLog.Abs.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=true

          # ---- Phase 2: Consumer libraries (depend on abstractions from Phase 1) ----
          dotnet pack PicoAop/src/PicoAop.DI/PicoAop.DI.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoMediator/src/PicoMediator/PicoMediator.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoMediator/src/PicoMediator.DI/PicoMediator.DI.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoDI/src/PicoDI/PicoDI.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:PicoDiPackageVersion="$VERSION" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoCfg/src/PicoCfg/PicoCfg.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoCfg/src/PicoCfg.DI/PicoCfg.DI.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:PicoDiPackageVersion="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          # ---- Phase 3: SerDe (depend on Phase 1 abstractions + Phase 2 consumer libs) ----
          dotnet pack PicoCfg/src/PicoCfg.Json/PicoCfg.Json.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoCfg/src/PicoCfg.Yaml/PicoCfg.Yaml.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoCfg/src/PicoCfg.Ini/PicoCfg.Ini.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoCfg/src/PicoCfg.Toml/PicoCfg.Toml.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoLog/src/PicoLog/PicoLog.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoLog/src/PicoLog.DI/PicoLog.DI.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:PicoDiPackageVersion="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoLog/src/PicoLog.Json/PicoLog.Json.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack PicoAop/src/PicoAop/PicoAop.csproj \
            --configuration Release \
            --output "$NUPKG_DIR" \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: |
            ./artifacts/nupkg/*.nupkg
            ./artifacts/nupkg/*.snupkg

  # ---------------------------------------------------------------------------
  # Publish
  # ---------------------------------------------------------------------------
  publish:
    name: Publish ${{ needs.pack.outputs.version || github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: pack
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nupkg

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish packages to NuGet
        shell: bash
        run: |
          shopt -s nullglob
          for file in *.nupkg; do
            if [[ "$file" != *.snupkg ]] && [[ "$file" != *.symbols.nupkg ]]; then
              dotnet nuget push "$file" \
                --api-key "${{ secrets.NUGET_API_KEY }}" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            *.nupkg
            *.snupkg
